name: astrorover_gyro
description: Gyroscope remote for AstroRover ESP32

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  sensors_plus: ^4.0.2        # accelerometer
  http: ^1.2.0                # HTTP to ESP32
  shared_preferences: ^2.2.2  # save IP + settings

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
